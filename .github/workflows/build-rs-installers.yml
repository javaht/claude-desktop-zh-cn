name: Build Rust installers

# 注意：本工作流中部分步骤（如 find、bash 命令）依赖 GNU 工具，
# 在 Windows runner 上由 Git Bash 提供（actions/checkout 默认安装），
# 不需要额外配置。

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to checkout (branch/tag/sha). Defaults to main."
        required: false
        type: string
        default: "main"
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: rust-macos-dmg
            bundles: dmg
          - os: windows-latest
            artifact_name: rust-windows-exe
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            # Root Cargo workspace writes build artifacts to the repository target/
            . -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build Tauri installer
        working-directory: apps/desktop
        run: npm run tauri -- build --ci --no-sign --bundles ${{ matrix.bundles }}

      - name: List bundle outputs
        shell: bash
        run: |
          find target/release/bundle -maxdepth 3 -type f -print 2>/dev/null || true

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/bundle/**
          if-no-files-found: error

  publish-release:
    name: Publish Rust installers to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: find release-artifacts -type f -print | sort

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t assets < <(find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            find release-artifacts -type f -print | sort
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi

name: Build Rust installers

# 注意：本工作流中部分步骤（如 find、bash 命令）依赖 GNU 工具，
# 在 Windows runner 上由 Git Bash 提供（actions/checkout 默认安装），
# 不需要额外配置。

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to checkout (branch/tag/sha). Defaults to main."
        required: false
        type: string
        default: "main"
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: rust-macos-universal-dmg
            bundles: dmg
            tauri_target_args: --target universal-apple-darwin
          - os: windows-latest
            artifact_name: rust-windows-exe
            bundles: nsis
            tauri_target_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            # Root Cargo workspace writes build artifacts to the repository target/
            . -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run Rust tests
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo test --workspace; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Build Tauri installer
        working-directory: apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm run tauri -- build --ci --no-sign --bundles ${{ matrix.bundles }} ${{ matrix.tauri_target_args }}; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Add platform names to installer filenames
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            dir="$(dirname "$file")"
            base="$(basename "$file")"
            case "$base" in
              *_macOS_*|*_Windows_*)
                continue
                ;;
              *.dmg)
                platform="macOS"
                ;;
              *-setup.exe|*.msi)
                platform="Windows"
                ;;
              *)
                continue
                ;;
            esac

            if [[ "$base" =~ ^(.+_[0-9]+\.[0-9]+\.[0-9]+)_(.+)$ ]]; then
              mv "$file" "$dir/${BASH_REMATCH[1]}_${platform}_${BASH_REMATCH[2]}"
            fi
          done < <(find target -path "*/release/bundle/*" -type f -print 2>/dev/null)

      - name: List bundle outputs
        shell: bash
        run: |
          find target -path "*/release/bundle/*" -type f -print 2>/dev/null || true

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/bundle/**
            target/*/release/bundle/**
          if-no-files-found: error

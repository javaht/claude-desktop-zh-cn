name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.1.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.commit-tag.outputs.tag }}
      version: ${{ steps.commit-tag.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must look like 1.1.4"
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Update release metadata
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("resources/release.json")
          if path.exists():
              data = json.loads(path.read_text(encoding="utf-8"))
          else:
              path.parent.mkdir(parents=True, exist_ok=True)
              data = {"repo": "javaht/claude-desktop-zh-cn"}
          data["repo"] = "javaht/claude-desktop-zh-cn"
          data["release"] = version
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          VERSION: ${{ inputs.version }}

      - name: Validate scripts
        run: |
          bash -n install-mac.command
          git diff --check

      - name: Commit and tag
        id: commit-tag
        run: |
          VERSION="${{ inputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add resources/release.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit"
          else
            git commit -m "Release $VERSION"
            git push origin main
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-rs-installers:
    name: Build ${{ matrix.artifact_name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: rust-macos-dmg
            bundles: dmg
          - os: windows-latest
            artifact_name: rust-windows-exe
            bundles: nsis

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: claude-desktop-zh-cn-rs/apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            claude-desktop-zh-cn-rs -> claude-desktop-zh-cn-rs/target
            claude-desktop-zh-cn-rs/apps/desktop/src-tauri -> claude-desktop-zh-cn-rs/apps/desktop/src-tauri/target

      - name: Install frontend dependencies
        working-directory: claude-desktop-zh-cn-rs/apps/desktop
        run: npm ci

      - name: Run Rust tests
        working-directory: claude-desktop-zh-cn-rs
        run: cargo test --workspace

      - name: Build Tauri installer
        working-directory: claude-desktop-zh-cn-rs/apps/desktop
        run: npm run tauri -- build --ci --no-sign --bundles ${{ matrix.bundles }}

      - name: List bundle outputs
        shell: bash
        run: |
          find claude-desktop-zh-cn-rs/target/release/bundle claude-desktop-zh-cn-rs/apps/desktop/src-tauri/target/release/bundle -maxdepth 3 -type f -print 2>/dev/null || true

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            claude-desktop-zh-cn-rs/target/release/bundle/**
            claude-desktop-zh-cn-rs/apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish-rs-installers:
    name: Publish Rust installers to GitHub Release
    needs:
      - prepare
      - build-rs-installers
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: find release-artifacts -type f -print | sort

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            find release-artifacts -type f -print | sort
            exit 1
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --generate-notes
          fi

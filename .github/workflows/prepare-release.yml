name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.1.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.commit-tag.outputs.tag }}
      version: ${{ steps.commit-tag.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure triggered from main
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "This workflow must be triggered from the main branch (got ${{ github.ref_name }})."
            exit 1
          fi

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must look like 1.1.4"
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update release version
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]

          cargo_path = Path("Cargo.toml")
          cargo_text = cargo_path.read_text(encoding="utf-8")
          cargo_text, count = re.subn(
              r'(?m)^(\[workspace\.package\]\nversion = ")[^"]+(")',
              rf'\g<1>{version}\2',
              cargo_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("Failed to update [workspace.package] version in Cargo.toml")
          cargo_path.write_text(cargo_text, encoding="utf-8")

          package_path = Path("apps/desktop/package.json")
          package_json = json.loads(package_path.read_text(encoding="utf-8"))
          package_json["version"] = version
          package_path.write_text(json.dumps(package_json, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          package_lock_path = Path("apps/desktop/package-lock.json")
          package_lock = json.loads(package_lock_path.read_text(encoding="utf-8"))
          package_lock["version"] = version
          package_lock["packages"][""]["version"] = version
          package_lock_path.write_text(json.dumps(package_lock, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          tauri_conf_path = Path("apps/desktop/src-tauri/tauri.conf.json")
          tauri_conf = json.loads(tauri_conf_path.read_text(encoding="utf-8"))
          tauri_conf["version"] = version
          tauri_conf_path.write_text(json.dumps(tauri_conf, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          release_path = Path("resources/release.json")
          if release_path.exists():
              data = json.loads(release_path.read_text(encoding="utf-8"))
          else:
              release_path.parent.mkdir(parents=True, exist_ok=True)
              data = {"repo": "javaht/claude-desktop-zh-cn"}
          data["repo"] = "javaht/claude-desktop-zh-cn"
          data["release"] = version
          release_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          VERSION: ${{ inputs.version }}

      - name: Refresh Cargo lockfile
        run: cargo check --workspace

      - name: Validate release structure
        run: |
          python3 - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          package_json = json.loads(Path("apps/desktop/package.json").read_text(encoding="utf-8"))
          package_lock = json.loads(Path("apps/desktop/package-lock.json").read_text(encoding="utf-8"))
          workspace = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          cargo_toml = tomllib.loads(Path("apps/desktop/src-tauri/Cargo.toml").read_text(encoding="utf-8"))
          tauri_conf = json.loads(Path("apps/desktop/src-tauri/tauri.conf.json").read_text(encoding="utf-8"))
          release_json = json.loads(Path("resources/release.json").read_text(encoding="utf-8"))

          expected_version = "${{ inputs.version }}"
          package_name = package_json["name"]
          lock_name = package_lock["name"]
          lock_root_name = package_lock["packages"][""]["name"]
          cargo_name = cargo_toml["package"]["name"]
          product_name = tauri_conf["productName"]
          versions = {
              "Cargo.toml": workspace["workspace"]["package"]["version"],
              "package.json": package_json["version"],
              "package-lock.json": package_lock["version"],
              "package-lock root package": package_lock["packages"][""]["version"],
              "tauri.conf.json": tauri_conf["version"],
              "resources/release.json": release_json["release"],
          }

          if not (package_name == lock_name == lock_root_name == cargo_name):
              raise SystemExit(
                  "Desktop package names are inconsistent across package.json, package-lock.json, and src-tauri/Cargo.toml; this shared package name determines the CLI/exe filename."
              )

          if package_name != "claude-desktop-zh-cn":
              raise SystemExit(
                  "Desktop package name must remain claude-desktop-zh-cn because the shared package name is the source of the built CLI/exe filename."
              )

          if product_name != "Claude-Zh":
              raise SystemExit(
                  "src-tauri/tauri.conf.json productName must remain Claude-Zh; it is the installer/display name and is validated separately from the CLI/exe filename."
              )

          if release_json.get("repo") != "javaht/claude-desktop-zh-cn":
              raise SystemExit("resources/release.json repo must match javaht/claude-desktop-zh-cn")

          mismatched_versions = {name: value for name, value in versions.items() if value != expected_version}
          if mismatched_versions:
              raise SystemExit(f"Release versions are inconsistent: {mismatched_versions}")

          print(
              f"Validated desktop naming chain and release version {expected_version}."
          )
          PY
          git diff --check

      - name: Commit and tag
        id: commit-tag
        run: |
          VERSION="${{ inputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock apps/desktop/package.json apps/desktop/package-lock.json apps/desktop/src-tauri/tauri.conf.json resources/release.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit"
          else
            git commit -m "Release $VERSION"
            git push origin main
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-rs-installers:
    name: Build ${{ matrix.artifact_name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: rust-macos-dmg
            bundles: dmg
          - os: windows-latest
            artifact_name: rust-windows-exe
            bundles: nsis

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            # Root Cargo workspace writes build artifacts to the repository target/
            . -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run Rust tests
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo test --workspace; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Build Tauri installer
        working-directory: apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm run tauri -- build --ci --no-sign --bundles ${{ matrix.bundles }}; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: List bundle outputs
        shell: bash
        run: |
          find target/release/bundle -maxdepth 3 -type f -print 2>/dev/null || true

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/bundle/**
          if-no-files-found: error

  publish-rs-installers:
    name: Publish Rust installers to GitHub Release
    needs:
      - prepare
      - build-rs-installers
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: find release-artifacts -type f -print | sort

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            find release-artifacts -type f -print | sort
            exit 1
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --generate-notes
          fi
